- name: Seed existing hybrid opencode config
  hosts: arch-opencode-profile-hybrid
  gather_facts: false
  tasks:
    - name: Ensure seeded opencode config directory exists
      ansible.builtin.file:
        path: /home/molecule/.config/opencode
        state: directory
        mode: "0755"
        owner: molecule
        group: molecule
      become: true

    - name: Seed stale Ollama model in opencode config
      ansible.builtin.copy:
        dest: /home/molecule/.config/opencode/opencode.jsonc
        mode: "0644"
        owner: molecule
        group: molecule
        content: |
          {
            "$schema": "https://opencode.ai/config.json",
            "provider": {
              "ollama": {
                "npm": "@ai-sdk/openai-compatible",
                "name": "Ollama (local)",
                "options": {
                  "baseURL": "http://127.0.0.1:11434/v1"
                },
                "models": {
                  "stale-model:latest": {
                    "name": "Stale local model",
                    "tool_call": false
                  }
                }
              },
              "seeded-other": {
                "name": "Seeded Other Provider"
              }
            }
          }
      become: true
