- name: Verify Arch opencode deployable profiles
  hosts: local
  gather_facts: false
  tasks:
    - name: Check opencode package
      ansible.builtin.command: pacman -Q opencode
      register: arch_opencode_profile_packages
      changed_when: false

    - name: Check bun package
      ansible.builtin.command: pacman -Q bun
      register: arch_opencode_profile_bun
      changed_when: false

    - name: Read opencode core config
      ansible.builtin.slurp:
        path: /home/molecule/.config/opencode/opencode.jsonc
      register: arch_opencode_profile_core_config

    - name: Read opencode TUI config
      ansible.builtin.slurp:
        path: /home/molecule/.config/opencode/tui.jsonc
      register: arch_opencode_profile_tui_config

    - name: Read oh-my-opencode-slim config
      ansible.builtin.slurp:
        path: /home/molecule/.config/opencode/oh-my-opencode-slim.json
      register: arch_opencode_profile_slim_config

    - name: Read user bashrc
      ansible.builtin.slurp:
        path: /home/molecule/.bashrc
      register: arch_opencode_profile_bashrc

    - name: Parse opencode profile configs
      ansible.builtin.set_fact:
        arch_opencode_profile_core: "{{ arch_opencode_profile_core_config.content | b64decode | from_json }}"
        arch_opencode_profile_tui: "{{ arch_opencode_profile_tui_config.content | b64decode | from_json }}"
        arch_opencode_profile_slim: "{{ arch_opencode_profile_slim_config.content | b64decode | from_json }}"
        arch_opencode_profile_bashrc_text: "{{ arch_opencode_profile_bashrc.content | b64decode }}"

    - name: Assert cloud and hybrid OpenAI presets stay identical
      ansible.builtin.assert:
        that:
          - hostvars['arch-opencode-profile-cloud'].arch_opencode_profile_slim.presets.openai == hostvars['arch-opencode-profile-hybrid'].arch_opencode_profile_slim.presets.openai
      run_once: true

    - name: Assert expected Arch opencode profile configuration
      ansible.builtin.assert:
        that:
          - "'opencode' in arch_opencode_profile_packages.stdout"
          - "'bun' in arch_opencode_profile_bun.stdout"
          - "'oh-my-opencode-slim@latest' in arch_opencode_profile_core.plugin"
          - "'oh-my-opencode-slim@latest' in arch_opencode_profile_tui.plugin"
          - arch_opencode_profile_core.agent.explore.disable
          - arch_opencode_profile_core.agent.general.disable
          - arch_opencode_profile_core.lsp
          - arch_opencode_profile_slim.autoUpdate
          - arch_opencode_profile_slim.preset == 'openai'
          - arch_opencode_profile_slim.presets.openai.orchestrator.model == 'openai/gpt-5.6-sol'
          - arch_opencode_profile_slim.presets.openai.orchestrator.variant == 'medium'
          - arch_opencode_profile_slim.presets.openai.oracle.model == 'openai/gpt-5.6-sol'
          - arch_opencode_profile_slim.presets.openai.oracle.variant == 'high'
          - arch_opencode_profile_slim.presets.openai.librarian.model == 'openai/gpt-5.5'
          - arch_opencode_profile_slim.presets.openai.librarian.variant == 'fast'
          - arch_opencode_profile_slim.presets.openai.explorer.model == 'openai/gpt-5.5'
          - arch_opencode_profile_slim.presets.openai.explorer.variant == 'fast'
          - arch_opencode_profile_slim.presets.openai.designer.model == 'openai/gpt-5.5'
          - arch_opencode_profile_slim.presets.openai.designer.variant == 'medium'
          - arch_opencode_profile_slim.presets.openai.fixer.model == 'openai/gpt-5.5'
          - arch_opencode_profile_slim.presets.openai.fixer.variant == 'medium'
          - "'OPENCODE_EXPERIMENTAL_BACKGROUND_SUBAGENTS' in arch_opencode_profile_bashrc_text"

    - name: Assert cloud OpenAI profile has no hybrid extras
      ansible.builtin.assert:
        that:
          - arch_opencode_profile_slim.presets.hybrid is not defined
          - arch_opencode_profile_core.provider is not defined
      when: arch_opencode_profile == 'cloud_openai'

    - name: Assert hybrid qwen/go profile configuration
      ansible.builtin.assert:
        that:
          - arch_opencode_profile_slim.presets.hybrid.orchestrator.model == 'openai/gpt-5.6-sol'
          - arch_opencode_profile_slim.presets.hybrid.orchestrator.variant == 'medium'
          - arch_opencode_profile_slim.presets.hybrid.oracle.model == 'openai/gpt-5.6-sol'
          - arch_opencode_profile_slim.presets.hybrid.oracle.variant == 'high'
          - arch_opencode_profile_slim.presets.hybrid.explorer.model == 'ollama/qwen3.5:9b'
          - arch_opencode_profile_slim.presets.hybrid.explorer.variant is not defined
          - arch_opencode_profile_slim.presets.hybrid.librarian.model == 'opencode-go/deepseek-v4-flash'
          - arch_opencode_profile_slim.presets.hybrid.librarian.variant is not defined
          - arch_opencode_profile_slim.presets.hybrid.fixer.model == 'opencode-go/deepseek-v4-pro'
          - arch_opencode_profile_slim.presets.hybrid.fixer.variant == 'max'
          - arch_opencode_profile_slim.presets.hybrid.designer.model == 'opencode-go/deepseek-v4-pro'
          - arch_opencode_profile_slim.presets.hybrid.designer.variant == 'max'
          - arch_opencode_profile_core.provider.ollama.npm == '@ai-sdk/openai-compatible'
          - arch_opencode_profile_core.provider.ollama.name == 'Ollama (local)'
          - arch_opencode_profile_core.provider.ollama.options.baseURL == 'http://127.0.0.1:11434/v1'
          - (arch_opencode_profile_core.provider.ollama.models.keys() | list | sort) == ['qwen3.5:9b']
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].name == 'Qwen3.5 9B (local Ollama)'
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].attachment
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].reasoning
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].tool_call
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].limit.context == 131072
          - arch_opencode_profile_core.provider.ollama.models['qwen3.5:9b'].limit.output == 8192
          - arch_opencode_profile_core.provider['seeded-other'].name == 'Seeded Other Provider'
      when: arch_opencode_profile == 'hybrid_qwen_go'
