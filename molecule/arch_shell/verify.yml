- name: Verify Arch shell configuration
  hosts: local
  gather_facts: false
  tasks:
    - name: Check user Bash configuration
      ansible.builtin.slurp:
        path: /home/molecule/.bashrc
      register: arch_shell_user_bashrc

    - name: Check system Bash configuration
      ansible.builtin.slurp:
        path: /etc/bash.bashrc
      register: arch_shell_system_bashrc

    - name: Check fzf profile script
      ansible.builtin.stat:
        path: /etc/profile.d/fzf.sh
      register: arch_shell_fzf_profile

    - name: Check bash-git-prompt checkout
      ansible.builtin.stat:
        path: /usr/local/share/bash-git-prompt/gitprompt.sh
      register: arch_shell_git_prompt

    - name: Check Flexoki prompt theme
      ansible.builtin.slurp:
        path: /usr/local/share/bash-git-prompt/themes/Flexoki.bgptheme
      register: arch_shell_git_prompt_theme

    - name: Check Yazi manager configuration
      ansible.builtin.slurp:
        path: /home/molecule/.config/yazi/yazi.toml
      register: arch_shell_yazi_config

    - name: Check Yazi flavor configuration
      ansible.builtin.slurp:
        path: /home/molecule/.config/yazi/theme.toml
      register: arch_shell_yazi_theme

    - name: Assert expected Arch shell files exist
      ansible.builtin.assert:
        that:
          - arch_shell_fzf_profile.stat.exists
          - arch_shell_git_prompt.stat.exists
          - "'[mgr]' in (arch_shell_yazi_config.content | b64decode)"
          - "'ratio = [ 1, 2, 3 ]' in (arch_shell_yazi_config.content | b64decode)"
          - "'dark = \"flexoki-dark\"' in (arch_shell_yazi_theme.content | b64decode)"
          - "'ANSIBLE MANAGED BLOCK bashrc' in (arch_shell_user_bashrc.content | b64decode)"
          - "'ANSIBLE MANAGED BLOCK bashrc' in (arch_shell_system_bashrc.content | b64decode)"
          - "'ANSIBLE MANAGED BLOCK bash-git-prompt' in (arch_shell_user_bashrc.content | b64decode)"
          - "'ANSIBLE MANAGED BLOCK bash-git-prompt' in (arch_shell_system_bashrc.content | b64decode)"
          - "'GIT_PROMPT_THEME=Flexoki' in (arch_shell_user_bashrc.content | b64decode)"
          - "'GIT_PROMPT_THEME=Flexoki' in (arch_shell_system_bashrc.content | b64decode)"
          - "'GIT_PROMPT_THEME_NAME=\"Flexoki\"' in (arch_shell_git_prompt_theme.content | b64decode)"
          - "'GIT_PROMPT_STAGED=\"${Yellow}●\"' in (arch_shell_git_prompt_theme.content | b64decode)"
          - "'${BoldBlue}${Time12a}${ResetColor} $' in (arch_shell_git_prompt_theme.content | b64decode)"
