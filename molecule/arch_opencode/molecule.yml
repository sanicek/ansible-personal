dependency:
  name: galaxy
  options:
    requirements-file: ${MOLECULE_PROJECT_DIRECTORY}/requirements.yml
    collections-path: ${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections
driver:
  name: podman
platforms:
  - name: install-only
    dockerfile: Dockerfile.j2
    image: docker.io/archlinux:latest
    pre_build_image: false
    command: /usr/bin/sleep infinity
    groups:
      - local
  - name: cloud-profile
    dockerfile: Dockerfile.j2
    image: docker.io/archlinux:latest
    pre_build_image: false
    command: /usr/bin/sleep infinity
    groups:
      - local
  - name: hybrid-profile
    dockerfile: Dockerfile.j2
    image: docker.io/archlinux:latest
    pre_build_image: false
    command: /usr/bin/sleep infinity
    groups:
      - local
  - name: hybrid-35b-profile
    dockerfile: Dockerfile.j2
    image: docker.io/archlinux:latest
    pre_build_image: false
    command: /usr/bin/sleep infinity
    groups:
      - local
provisioner:
  name: ansible
  env:
    ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/.ansible/collections:${MOLECULE_PROJECT_DIRECTORY}
  inventory:
    group_vars:
      local:
        bootstrap_user_home: /home/molecule
        bootstrap_user_name: molecule
    host_vars:
      install-only:
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3
        ansible_user: molecule
        arch_opencode_profile: ""
      cloud-profile:
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3
        ansible_user: molecule
        arch_opencode_profile: cloud_openai
      hybrid-profile:
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3
        ansible_user: molecule
        arch_opencode_profile: hybrid_qwen_go
      hybrid-35b-profile:
        ansible_become_method: sudo
        ansible_python_interpreter: /usr/bin/python3
        ansible_user: molecule
        arch_opencode_profile: hybrid_qwen35b_go
scenario:
  test_sequence:
    - dependency
    - destroy
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
verifier:
  name: ansible
