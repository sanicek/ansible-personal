- name: FZF - Install fzf package
  package:
    name: fzf
    state: present
  when: package_manager is defined
  
- name: FZF - Install git package
  package:
    name: git
    state: present
  when: package_manager is defined

- name: FZF - Clone fzf repository to /usr/local/share
  git:
    repo: 'https://github.com/junegunn/fzf.git'
    dest: /usr/local/share/fzf
    version: master
  become: true

- name: FZF - Run fzf install script
  shell: /usr/local/share/fzf/install --key-bindings --completion --no-update-rc
  args:
    chdir: /usr/local/share/fzf
  become: true

- name: FZF - Add fzf configuration to /etc/profile.d
  copy:
    dest: /etc/profile.d/fzf.sh
    content: |
      #!/bin/sh
      # Source fzf key bindings and completion
      if [ -f /usr/local/share/fzf/shell/key-bindings.bash ]; then
        source /usr/local/share/fzf/shell/key-bindings.bash
      fi
      if [ -f /usr/local/share/fzf/shell/completion.bash ]; then
        source /usr/local/share/fzf/shell/completion.bash
      fi
  become: true

- name: FZF - Set permissions for fzf configuration
  file:
    path: /etc/profile.d/fzf.sh
    mode: '0755'
  become: true


- name: FZF - Ensure fzf is sourced in root's .bashrc
  lineinfile:
    path: /root/.bashrc
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present
  become: true

- name: FZF - Add fzf configuration to .bashrc
  lineinfile:
    path: "{{ user_home }}/.bashrc"
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present
  become: false