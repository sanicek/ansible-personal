- name: BASH-CONFIG - Add bash bashrc stuff to user profile
  blockinfile:
    path: "{{ user_home }}/.bashrc"  
    block: |
      #history setup
      HISTCONTROL=ignoreboth
      shopt -s histappend
      HISTSIZE=1000
      HISTFILESIZE=2000
      
      shopt -s checkwinsize
      
      # enable color support of ls and also add handy aliases
      if [ -x /usr/bin/dircolors ]; then
        test -r ~/.dircolors && eval "$(dircolors -b ~/.dircolors)" || eval "$(dircolors -b)"
        alias ls='ls --color=auto'
        #alias dir='dir --color=auto'
        #alias vdir='vdir --color=auto'

        alias grep='grep --color=auto'
        alias fgrep='fgrep --color=auto'
        alias egrep='egrep --color=auto'
      fi
    marker: "# {mark} ANSIBLE MANAGED BLOCK bashrc"
    create: yes
  become: no  # Run this as the target user, not root
  
- name: BASH-CONFIG - Add bash bashrc stuff to bashrc.local
  blockinfile:
    path: "/etc/bash.bashrc.local"  
    block: |
      #history setup
      HISTCONTROL=ignoreboth
      shopt -s histappend
      HISTSIZE=1000
      HISTFILESIZE=2000
      
      shopt -s checkwinsize
      
      # enable color support of ls and also add handy aliases
      if [ -x /usr/bin/dircolors ]; then
        test -r ~/.dircolors && eval "$(dircolors -b ~/.dircolors)" || eval "$(dircolors -b)"
        alias ls='ls --color=auto'
        #alias dir='dir --color=auto'
        #alias vdir='vdir --color=auto'

        alias grep='grep --color=auto'
        alias fgrep='fgrep --color=auto'
        alias egrep='egrep --color=auto'
      fi
    marker: "# {mark} ANSIBLE MANAGED BLOCK bashrc"
    create: yes