- name: Check whether Visual Studio Code is installed
  ansible.builtin.command: "pacman -Q {{ arch_vscode_aur_package }}"
  register: arch_vscode_package
  changed_when: false
  failed_when: false

- name: Install Visual Studio Code from AUR
  ansible.builtin.command: "{{ arch_aur_helper }} -S --needed --noconfirm {{ arch_vscode_aur_package }}"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
  when: arch_vscode_package.rc != 0
