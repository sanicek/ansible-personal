- name: Validate opencode profile name
  ansible.builtin.assert:
    that:
      - arch_opencode_profile in ['', 'omo-slim-cloud-openai', 'omo-slim-hybrid-qwen35b-go', 'omo-slim-cloud-copilot']
    fail_msg: "Invalid opencode profile '{{ arch_opencode_profile }}'. Valid profiles: omo-slim-cloud-openai, omo-slim-hybrid-qwen35b-go, omo-slim-cloud-copilot"
  when: arch_opencode_profile | length > 0

- name: Load opencode profile behavior vars
  ansible.builtin.include_vars:
    file: "profiles/{{ arch_opencode_profile }}.yml"
  when: arch_opencode_profile | length > 0

- name: Gather architecture facts when needed
  ansible.builtin.setup:
    gather_subset:
      - hardware
  when: ansible_facts["architecture"] is not defined

- name: Require supported opencode architecture
  ansible.builtin.assert:
    that:
      - ansible_facts["architecture"] in ['x86_64', 'amd64', 'aarch64', 'arm64']
    fail_msg: "OpenCode supports x86_64/amd64 and arm64/aarch64 Linux only. Detected: {{ ansible_facts['architecture'] | default('unknown') }}."

- name: Install Bun package
  community.general.pacman:
    name: "{{ arch_opencode_bun_package }}"
    state: present
  become: true

- name: Remove legacy Pacman opencode package
  community.general.pacman:
    name: opencode
    state: absent
  become: true

- name: Resolve latest stable opencode npm release
  ansible.builtin.uri:
    url: "{{ arch_opencode_npm_registry_url }}"
    return_content: true
    status_code: 200
  register: arch_opencode_npm_latest
  changed_when: false

- name: Set resolved opencode version
  ansible.builtin.set_fact:
    arch_opencode_resolved_version: "{{ arch_opencode_npm_latest.json.version }}"

- name: Require resolved opencode version
  ansible.builtin.assert:
    that:
      - arch_opencode_resolved_version is match('^[0-9]+\.[0-9]+\.[0-9]+')
    fail_msg: "The npm registry returned an invalid opencode version: {{ arch_opencode_resolved_version | default('unknown') }}."

- name: Check target-user opencode version
  ansible.builtin.command: "{{ arch_opencode_binary }} --version"
  register: arch_opencode_installed_version
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    BUN_INSTALL: "{{ arch_opencode_bun_install_dir }}"

- name: Normalize installed opencode version
  ansible.builtin.set_fact:
    arch_opencode_installed_version_normalized: "{{ arch_opencode_installed_version.stdout | trim | regex_replace('^v', '') }}"

- name: Install or update latest stable opencode with Bun
  ansible.builtin.command:
    argv:
      - "{{ arch_opencode_bun_executable }}"
      - add
      - --global
      - "{{ arch_opencode_npm_package }}@{{ arch_opencode_resolved_version }}"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
    BUN_INSTALL: "{{ arch_opencode_bun_install_dir }}"
  when: >-
    arch_opencode_installed_version.rc != 0
    or arch_opencode_installed_version_normalized != arch_opencode_resolved_version

- name: Check Bun-managed opencode binary
  ansible.builtin.stat:
    path: "{{ arch_opencode_binary }}"
  register: arch_opencode_binary_stat
  become: true

- name: Require executable Bun-managed opencode binary
  ansible.builtin.assert:
    that:
      - arch_opencode_binary_stat.stat.exists
      - arch_opencode_binary_stat.stat.executable
      - arch_opencode_binary_stat.stat.pw_name == user_name
    fail_msg: "Bun did not install an executable opencode binary at {{ arch_opencode_binary }} for {{ user_name }}."

- name: Expose Bun-managed opencode binary system-wide
  ansible.builtin.file:
    src: "{{ arch_opencode_binary }}"
    dest: "{{ arch_opencode_system_link }}"
    state: link
    force: true
    owner: root
    group: root
  become: true

- name: Ensure opencode configuration directory exists
  ansible.builtin.file:
    path: "{{ arch_opencode_config_dir }}"
    state: directory
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  when: arch_opencode_profile | length > 0

- name: Deploy opencode managed config files
  ansible.builtin.copy:
    src: "profiles/{{ arch_opencode_profile }}/{{ item }}"
    dest: "{{ arch_opencode_config_dir }}/{{ item }}"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  loop: "{{ arch_opencode_managed_files }}"
  when: arch_opencode_profile | length > 0

- name: Ensure oh-my-opencode-slim directory exists
  ansible.builtin.file:
    path: "{{ arch_opencode_config_dir }}/oh-my-opencode-slim"
    state: directory
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  when: arch_opencode_profile is match('^omo-slim-')

- name: Deploy oh-my-opencode-slim config
  ansible.builtin.copy:
    src: "profiles/{{ arch_opencode_profile }}/{{ item }}"
    dest: "{{ arch_opencode_config_dir }}/{{ item }}"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  loop: "{{ arch_opencode_omo_slim_managed_files }}"
  when: arch_opencode_profile is match('^omo-slim-')

- name: Ensure opencode plugins directory exists
  ansible.builtin.file:
    path: "{{ arch_opencode_config_dir }}/plugins"
    state: directory
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  when: arch_opencode_profile | length > 0

- name: Deploy notify plugin
  ansible.builtin.copy:
    src: notify.ts
    dest: "{{ arch_opencode_config_dir }}/plugins/notify.ts"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  when: arch_opencode_profile | length > 0

- name: Build opencode shell environment
  ansible.builtin.set_fact:
    arch_opencode_effective_shell_env: >-
      {{ arch_opencode_shell_env
         | combine({'OPENCODE_EXPERIMENTAL_BACKGROUND_SUBAGENTS': 'true'}
                   if arch_opencode_enable_background_subagents else {}) }}
  when: arch_opencode_profile | length > 0

- name: Configure opencode shell environment
  ansible.builtin.blockinfile:
    path: "{{ arch_opencode_shell_env_path }}"
    marker: "# {mark} ANSIBLE MANAGED BLOCK opencode environment"
    block: |
      {% for item in arch_opencode_effective_shell_env | dict2items %}
      export {{ item.key }}={{ item.value | quote }}
      {% endfor %}
    create: true
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: false
  when:
    - arch_opencode_profile | length > 0
    - arch_opencode_effective_shell_env | length > 0
