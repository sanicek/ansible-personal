arch_opencode_install_bun: true
arch_opencode_plugins:
  - oh-my-opencode-slim@latest
arch_opencode_tui_plugins:
  - oh-my-opencode-slim@latest
arch_opencode_enable_background_subagents: true
arch_opencode_core_config:
  agent:
    explore:
      disable: true
    general:
      disable: true
arch_opencode_enable_lsp_default: true
arch_opencode_extra_config_files:
  - path: "{{ arch_opencode_config_dir }}/oh-my-opencode-slim.json"
    content:
      "$schema": "https://unpkg.com/oh-my-opencode-slim@latest/oh-my-opencode-slim.schema.json"
      autoUpdate: true
      preset: openai
      presets:
        openai:
          orchestrator:
            model: openai/gpt-5.6-sol
            variant: medium
            skills:
              - "*"
            mcps:
              - "*"
              - "!context7"
          oracle:
            model: openai/gpt-5.6-sol
            variant: high
            skills:
              - simplify
            mcps: []
          librarian:
            model: openai/gpt-5.3-codex
            variant: low
            skills: []
            mcps:
              - websearch
              - context7
              - gh_grep
          explorer:
            model: openai/gpt-5.3-codex
            variant: low
            skills: []
            mcps: []
          designer:
            model: openai/gpt-5.5
            variant: medium
            skills: []
            mcps: []
          fixer:
            model: openai/gpt-5.5
            variant: medium
            skills: []
            mcps: []
