arch_opencode_bun_package: bun
arch_opencode_npm_package: opencode-ai
arch_opencode_npm_registry_url: "https://registry.npmjs.org/{{ arch_opencode_npm_package }}/latest"
arch_opencode_bun_executable: /usr/bin/bun
arch_opencode_bun_install_dir: "{{ user_home }}/.bun"
arch_opencode_bun_global_bin: "{{ arch_opencode_bun_install_dir }}/bin"
arch_opencode_binary: "{{ arch_opencode_bun_global_bin }}/opencode"
arch_opencode_system_link: /usr/local/bin/opencode

arch_opencode_profile: ""

arch_opencode_config_dir: "{{ user_home }}/.config/opencode"
arch_opencode_managed_files:
  - opencode.jsonc
  - tui.jsonc

arch_opencode_omo_slim_managed_files:
  - oh-my-opencode-slim.json

arch_opencode_enable_background_subagents: false
arch_opencode_shell_env: {}
arch_opencode_shell_env_path: "{{ user_home }}/.bashrc"
