- name: Install fzf packages
  community.general.pacman:
    name:
      - fzf
      - git
    state: present

- name: Add fzf configuration to /etc/profile.d
  ansible.builtin.copy:
    dest: /etc/profile.d/fzf.sh
    content: |
      #!/bin/sh
      # Source Arch package-provided fzf key bindings and completion for Bash.
      if [ -n "${BASH_VERSION:-}" ]; then
        if [ -f /usr/share/fzf/key-bindings.bash ]; then
          . /usr/share/fzf/key-bindings.bash
        fi
        if [ -f /usr/share/fzf/completion.bash ]; then
          . /usr/share/fzf/completion.bash
        fi
      fi
    mode: "0755"

- name: Ensure fzf is sourced in root's .bashrc
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present

- name: Ensure fzf is sourced in user's .bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present
  become: false
