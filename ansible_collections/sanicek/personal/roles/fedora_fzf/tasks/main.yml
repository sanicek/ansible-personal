- name: Install fzf packages
  ansible.builtin.dnf:
    name:
      - fzf
      - git
    state: present

- name: Clone fzf repository to /usr/local/share
  ansible.builtin.git:
    repo: https://github.com/junegunn/fzf.git
    dest: /usr/local/share/fzf
    version: master

- name: Run fzf install script
  ansible.builtin.command: /usr/local/share/fzf/install --key-bindings --completion --no-update-rc
  args:
    chdir: /usr/local/share/fzf

- name: Add fzf configuration to /etc/profile.d
  ansible.builtin.copy:
    dest: /etc/profile.d/fzf.sh
    content: |
      #!/bin/sh
      # Source fzf key bindings and completion.
      if [ -f /usr/local/share/fzf/shell/key-bindings.bash ]; then
        . /usr/local/share/fzf/shell/key-bindings.bash
      fi
      if [ -f /usr/local/share/fzf/shell/completion.bash ]; then
        . /usr/local/share/fzf/shell/completion.bash
      fi
    mode: "0755"

- name: Ensure fzf is sourced in root's .bashrc
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present

- name: Ensure fzf is sourced in user's .bashrc
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    regexp: 'source /etc/profile.d/fzf.sh'
    line: 'source /etc/profile.d/fzf.sh'
    state: present
  become: false
