- name: Ensure .bash_profile exists for root
  ansible.builtin.file:
    path: /root/.bash_profile
    state: touch
    mode: "0644"
  become: true

- name: Ensure .bashrc exists for root
  ansible.builtin.file:
    path: /root/.bashrc
    state: touch
    mode: "0644"
  become: true

- name: Ensure .bash_profile sources .bashrc for root
  ansible.builtin.lineinfile:
    path: /root/.bash_profile
    regexp: 'if \[ -f ~/.bashrc \]; then source ~/.bashrc; fi'
    line: 'if [ -f ~/.bashrc ]; then source ~/.bashrc; fi'
    state: present
  become: true

- name: Ensure .bashrc exits when not interactive for root
  ansible.builtin.lineinfile:
    path: /root/.bashrc
    regexp: '\[\[ \$- != \*i\* \]\] && return'
    line: '[[ $- != *i* ]] && return'
    state: present
  become: true

- name: Ensure .bash_profile exists for current user
  ansible.builtin.file:
    path: "{{ user_home }}/.bash_profile"
    state: touch
    mode: "0644"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: Ensure .bashrc exists for current user
  ansible.builtin.file:
    path: "{{ user_home }}/.bashrc"
    state: touch
    mode: "0644"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: Ensure .bash_profile sources .bashrc for current user
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bash_profile"
    regexp: 'if \[ -f ~/.bashrc \]; then source ~/.bashrc; fi'
    line: 'if [ -f ~/.bashrc ]; then source ~/.bashrc; fi'
    state: present
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: Ensure .bashrc exits when not interactive for current user
  ansible.builtin.lineinfile:
    path: "{{ user_home }}/.bashrc"
    regexp: '\[\[ \$- != \*i\* \]\] && return'
    line: '[[ $- != *i* ]] && return'
    state: present
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"
