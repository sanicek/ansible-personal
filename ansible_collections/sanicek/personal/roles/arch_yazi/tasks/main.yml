- name: Install Yazi packages
  community.general.pacman:
    name: "{{ arch_yazi_packages }}"
    state: present

- name: Ensure Yazi configuration directory exists
  ansible.builtin.file:
    path: "{{ user_home }}/.config/yazi"
    state: directory
    mode: "0755"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: true

- name: Remove obsolete Yazi package entries
  ansible.builtin.command: "ya pkg delete {{ item }}"
  loop: "{{ arch_yazi_obsolete_packages }}"
  register: arch_yazi_obsolete_delete
  changed_when: arch_yazi_obsolete_delete.rc == 0
  failed_when: false
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: Install Yazi Flexoki Dark flavor
  ansible.builtin.command: "ya pkg add {{ arch_yazi_flavor_package }}"
  args:
    creates: "{{ user_home }}/.config/yazi/flavors/{{ arch_yazi_flavor }}.yazi/flavor.toml"
  become: true
  become_user: "{{ user_name }}"
  environment:
    HOME: "{{ user_home }}"

- name: Configure Yazi manager ratio
  ansible.builtin.copy:
    dest: "{{ user_home }}/.config/yazi/yazi.toml"
    content: |
      [mgr]
      ratio = [ {{ arch_yazi_ratio | join(', ') }} ]
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: true

- name: Configure Yazi Flexoki Dark flavor
  ansible.builtin.copy:
    dest: "{{ user_home }}/.config/yazi/theme.toml"
    content: |
      [flavor]
      dark = "{{ arch_yazi_flavor }}"
    mode: "0644"
    owner: "{{ user_name }}"
    group: "{{ user_name }}"
  become: true
