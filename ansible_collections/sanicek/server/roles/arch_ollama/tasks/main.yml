- name: Gather distribution facts when needed
  ansible.builtin.setup:
    gather_subset:
      - distribution
  when: "'distribution' not in ansible_facts"

- name: Require Arch Linux or compatible derivative
  ansible.builtin.assert:
    that:
      - ansible_facts["distribution"] in arch_ollama_supported_distributions
    fail_msg: "This role supports Arch Linux compatible systems only. Detected: {{ ansible_facts['distribution'] | default('unknown') }}."

- name: Validate Ollama backend
  ansible.builtin.assert:
    that:
      - arch_ollama_backend in arch_ollama_packages
    fail_msg: "Unsupported Ollama backend '{{ arch_ollama_backend }}'. Supported: {{ arch_ollama_packages.keys() | list | join(', ') }}."

- name: Install Ollama package
  community.general.pacman:
    name: "{{ arch_ollama_packages[arch_ollama_backend] }}"
    state: present

- name: Install ROCm diagnostics
  community.general.pacman:
    name: "{{ arch_ollama_diagnostic_packages }}"
    state: present
  when:
    - arch_ollama_backend == 'rocm'
    - arch_ollama_install_diagnostics

- name: Determine whether Ollama firewall rules are needed
  ansible.builtin.set_fact:
    arch_ollama_firewall_needed: "{{ not (arch_ollama_host is match('^(127\\.0\\.0\\.1|localhost|\\[::1\\]|::1)(:|$)')) }}"

- name: Configure Ollama firewall rules
  ansible.builtin.include_role:
    name: sanicek.server.ufw
  vars:
    server_ufw_rules: "{{ arch_ollama_firewall_rules }}"
  when:
    - arch_ollama_manage_firewall
    - arch_ollama_firewall_needed

- name: Ensure Ollama systemd override directory exists
  ansible.builtin.file:
    path: /etc/systemd/system/ollama.service.d
    state: directory
    mode: "0755"

- name: Configure Ollama service environment
  ansible.builtin.template:
    src: override.conf.j2
    dest: /etc/systemd/system/ollama.service.d/override.conf
    mode: "0644"
  notify:
    - Reload systemd
    - Restart Ollama

- name: Ensure Ollama service is enabled and started
  ansible.builtin.systemd_service:
    name: ollama.service
    enabled: true
    state: started

- name: Flush Ollama handlers before API checks
  ansible.builtin.meta: flush_handlers

- name: Wait for Ollama API
  ansible.builtin.uri:
    url: "http://{{ '127.0.0.1:11434' if arch_ollama_host.startswith('0.0.0.0:') else arch_ollama_host }}/api/tags"
    method: GET
    status_code: 200
  register: arch_ollama_api
  retries: 12
  delay: 5
  until: arch_ollama_api.status == 200

- name: List local Ollama models
  ansible.builtin.command: ollama list
  register: arch_ollama_local_models
  changed_when: false

- name: Pull Ollama models
  ansible.builtin.command: "ollama pull {{ item }}"
  loop: "{{ arch_ollama_models }}"
  when: arch_ollama_local_models.stdout is not search('(^|\n)' ~ (item | regex_escape) ~ '\s')

- name: Ensure custom model directory exists
  ansible.builtin.file:
    path: /etc/ollama/modelfiles
    state: directory
    mode: "0755"
  when: arch_ollama_custom_models | length > 0

- name: Capture base model metadata for custom models
  ansible.builtin.command: "ollama show {{ item.base }}"
  loop: "{{ arch_ollama_custom_models }}"
  register: _ollama_base_show
  changed_when: false
  when: arch_ollama_custom_models | length > 0

- name: Template custom model Modelfiles
  ansible.builtin.template:
    src: modelfile.j2
    dest: "/etc/ollama/modelfiles/{{ item.name }}.Modelfile"
    mode: "0644"
  loop: "{{ arch_ollama_custom_models }}"
  register: _ollama_modelfile
  when: arch_ollama_custom_models | length > 0

- name: Persist base model digests
  ansible.builtin.copy:
    content: "{{ _ollama_base_show.results[ansible_loop.index0].stdout }}"
    dest: "/etc/ollama/modelfiles/{{ item.name }}.base-digest"
    mode: "0644"
  loop: "{{ arch_ollama_custom_models }}"
  register: _ollama_digest
  when: arch_ollama_custom_models | length > 0

- name: List local Ollama models for custom model check
  ansible.builtin.command: ollama list
  register: _ollama_custom_local
  changed_when: false
  when: arch_ollama_custom_models | length > 0

- name: Build custom Ollama models
  ansible.builtin.command: "ollama create {{ item.name }} -f /etc/ollama/modelfiles/{{ item.name }}.Modelfile"
  loop: "{{ arch_ollama_custom_models }}"
  loop_control:
    index_var: _i
  when:
    - arch_ollama_custom_models | length > 0
    - _ollama_modelfile.results[_i].changed
      or _ollama_digest.results[_i].changed
      or _ollama_custom_local.stdout is not search('(^|\n)' ~ (item.name | regex_escape) ~ '\s')
