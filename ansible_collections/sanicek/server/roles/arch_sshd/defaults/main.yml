arch_sshd_supported_distributions:
  - Archlinux
  - CachyOS

arch_sshd_package: openssh
arch_sshd_service: sshd.service
arch_sshd_manage_firewall: true
arch_sshd_firewall_rules:
  - port: "22"
    proto: tcp
    rule: allow
    comment: SSH

# -- Hardening options --
arch_sshd_config_dropin_enable: true
arch_sshd_permit_root_login: "no"
arch_sshd_password_auth: "no"
arch_sshd_challenge_response_auth: "no"
arch_sshd_kbd_interactive_auth: "no"
arch_sshd_pubkey_auth: "yes"
arch_sshd_x11_forwarding: "no"
arch_sshd_allow_tcp_forwarding: local
arch_sshd_gateway_ports: "no"
arch_sshd_permit_tunnel: "no"
arch_sshd_max_auth_tries: 3
arch_sshd_login_grace_time: 60
arch_sshd_max_sessions: 4
arch_sshd_max_startups: "10:30:60"
arch_sshd_client_alive_interval: 300
arch_sshd_client_alive_count_max: 2
arch_sshd_use_dns: "no"
arch_sshd_kex_algorithms:
  - curve25519-sha256
  - curve25519-sha256@libssh.org
arch_sshd_macs:
  - hmac-sha2-512-etm@openssh.com
  - hmac-sha2-256-etm@openssh.com
arch_sshd_ciphers:
  - chacha20-poly1305@openssh.com
  - aes256-gcm@openssh.com
  - aes128-gcm@openssh.com
